apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: install-external-secrets
  namespace: flux-system
spec:
  resources:
    - namespace.yaml
    - helmrepository.yaml
    - helmrelease.yaml
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: external-secrets
      namespace: external-secrets