apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-external-secrets
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: install-external-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  resources:
    - serviceaccount.yaml
    - clustersecretstore.yaml