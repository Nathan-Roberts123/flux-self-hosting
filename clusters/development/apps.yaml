apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: infrastructure-config
  path: "./apps/development"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
