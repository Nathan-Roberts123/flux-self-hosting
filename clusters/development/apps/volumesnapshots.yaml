apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-volumesnapshots
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: apps-install
  path: "./apps/development/volumesnapshots"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system